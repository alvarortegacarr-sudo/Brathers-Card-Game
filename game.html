<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bra - Card Game</title>
    <link rel="icon" href="css/Favicon.jpeg" type="image/png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <!-- Phase Transition Overlay (injected by JS, but anchor lives here) -->
    <div id="phaseOverlay" class="phase-overlay"></div>

    <div id="app">
        <!-- Header -->
        <header>
            <div class="room-info">
                <span id="roomCode">ROOM: ----</span>
                <button onclick="copyCode()">Copy</button>
            </div>
            <div class="game-title">BRA</div>
            <button onclick="leaveGame()" class="leave-btn">Leave</button>
        </header>

        <!-- Main Game Area -->
        <main>
            <!-- Table -->
            <div class="table-area">
                <div id="table" class="table">
                    <!-- Seats 1-5 positioned absolutely -->
                    <div class="seat" id="seat-1" data-seat="1">
                        <div class="seat-info">
                            <div class="seat-name">Empty</div>
                            <div class="seat-bid">-</div>
                        </div>
                    </div>
                    <div class="seat" id="seat-2" data-seat="2">
                        <div class="seat-info">
                            <div class="seat-name">Empty</div>
                            <div class="seat-bid">-</div>
                        </div>
                    </div>
                    <div class="seat" id="seat-3" data-seat="3">
                        <div class="seat-info">
                            <div class="seat-name">Empty</div>
                            <div class="seat-bid">-</div>
                        </div>
                    </div>
                    <div class="seat" id="seat-4" data-seat="4">
                        <div class="seat-info">
                            <div class="seat-name">Empty</div>
                            <div class="seat-bid">-</div>
                        </div>
                    </div>
                    <div class="seat" id="seat-5" data-seat="5">
                        <div class="seat-info">
                            <div class="seat-name">Empty</div>
                            <div class="seat-bid">-</div>
                        </div>
                    </div>

                    <!-- Center Area -->
                    <div class="center">
                        <!-- Top: Triunfo and Discarded side by side -->
                        <div class="top-cards">
                            <div id="triunfo" class="triunfo hidden">
                                <div class="label">EL TRIUNFO</div>
                                <div class="card-name">-</div>
                                <div class="crown">👑</div>
                            </div>
                            <div id="discarded" class="discarded hidden">
                                <div class="label">DISCARDED</div>
                                <div class="card-name">-</div>
                            </div>
                        </div>
                        
                        <!-- Middle: Played Cards -->
                        <div id="current-play" class="current-play">
                            <div class="plays-label">Cards in Play</div>
                            <div class="plays-container" id="playsContainer">
                                <p class="no-cards">Waiting for cards...</p>
                            </div>
                        </div>
                        
                        <!-- Bottom: Turn Indicator -->
                        <div id="turn-indicator" class="turn-indicator">Waiting...</div>
                    </div>
                </div>

                <!-- Host Controls -->
                <div id="hostControls" class="host-controls hidden">
                    <button id="startBtn" onclick="startGame()" class="start-btn">🚀 Start Game</button>
                    <p class="min-players">Need at least 2 players</p>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="players-panel">
                    <h3>Players</h3>
                    <ul id="playerList"></ul>
                </div>
                
                <div class="scores-panel">
                    <h3>Scores</h3>
                    <div id="scoreList"></div>
                </div>

                <div class="chat-panel">
                    <h3>Chat</h3>
                    <div id="chatLog" class="chat-log"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Message..." maxlength="200">
                        <button onclick="sendChat()">Send</button>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Player Hand Area -->
        <footer id="handArea" class="hand-area">
            <div class="phase-info" id="phaseInfo">Waiting for host...</div>
            <div class="hand-container" id="handContainer"></div>
        </footer>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
