<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link rel="icon" href="css/Favicon.jpeg" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Bra</title>
    <link rel="stylesheet" href="css/lobby.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Bienvenido al bra online!</h1>
            <p>5 Jugadores máximo en una épica partida de cartas machistas</p>
        </div>

        <div class="menu">
            <div class="card create-room">
                <h2>Crea una sala</h2>
                <input type="text" id="playerName" placeholder="Tu nombre de fundador SICMERO" maxlength="30">
                <button onclick="createRoom()" class="btn-primary">
                    <span class="icon">➕</span> Crea la sala hombre
                </button>
            </div>

            <div class="divider">or</div>

            <div class="card join-room">
                <h2>Unete a una sala</h2>
                <input type="text" id="joinName" placeholder="Your Name" maxlength="30">
                <input type="text" id="roomCode" placeholder="Código de la sala (6 letras)" maxlength="6" style="text-transform: uppercase;">
                <button onclick="joinRoom()" class="btn-secondary">
                    <span class="icon"></span> Unete a un fundador SICMERO
                </button>
            </div>
        </div>

        <div id="errorMsg" class="error"></div>
        
        <div class="features">
            <div class="feature">🔄 Sincronia en tiempo real</div>
            <div class="feature">🔒 Salas privadas de juego</div>
            <div class="feature">👥 5 Jugadores máximo</div>
        </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/supabase.js"></script>
        <script src="js/lobby.js"></script>
</body>
</html>
